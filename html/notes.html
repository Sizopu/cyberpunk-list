<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk RED - Notes</title>
<link rel="icon" type="image/png" href="../images/cyberpunk.png">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/notes.css">
</head>
<body class="cyber-page">

<!-- TOP NAVIGATION BAR -->
<div class="top-nav">
  <div class="nav-brand">CYBERPUNK RED</div>
  <div class="nav-links">
    <a href="main.html" class="nav-link">Characters</a>
    <a href="index.html" class="nav-link">Character Sheet</a>
    <a href="implants.html" class="nav-link">Implants</a>
    <a href="notes.html" class="nav-link active">Notes</a>
    <a href="mobs.html" class="nav-link">Mobs</a>
    <a href="scripts.html" class="nav-link">Scripts</a>
    <button class="nav-btn" id="dice-roll-btn">🎲 Roll Dice</button>
  </div>
</div>

<div class="notes-page">
  <div class="notes-container">
    <!-- Left Panel - Notes List -->
    <div class="notes-sidebar">
      <div class="notes-header">
        <span>NOTES</span>
        <button class="add-note-btn" id="add-note-btn" title="Add Note">+</button>
      </div>
      
      <!-- Add Note Type Dropdown -->
      <div class="add-note-wrapper">
        <div class="note-type-dropdown" id="note-type-dropdown">
          <button data-type="note">📄 Note</button>
          <button data-type="table">📊 Table</button>
        </div>
      </div>
      
      <div class="notes-list" id="notes-list">
        <!-- Notes will be added here -->
      </div>
    </div>

    <!-- Right Panel - Note Content -->
    <div class="notes-content-panel">
      <div class="note-editor" id="note-editor">
        <div class="editor-placeholder">
          <p>Select a note or create a new one</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- DICE ROLL DIALOG -->
<div class="dialog-overlay" id="dice-dialog-overlay">
  <div class="dialog dice-dialog">
    <div class="dialog-header">
      <span>Dice Roll</span>
      <button class="dialog-close" id="dice-dialog-close">×</button>
    </div>
    <div class="dialog-content">
      <div class="dice-options" id="dice-options">
        <div class="dice-option-group">
          <label>Dice Type</label>
          <div class="dice-type-buttons">
            <button class="dice-type-btn" data-dice="4">d4</button>
            <button class="dice-type-btn" data-dice="6">d6</button>
            <button class="dice-type-btn" data-dice="8">d8</button>
            <button class="dice-type-btn active" data-dice="10">d10</button>
            <button class="dice-type-btn" data-dice="12">d12</button>
            <button class="dice-type-btn" data-dice="20">d20</button>
          </div>
        </div>
        <div class="dice-option-group">
          <label>Number of Dice</label>
          <div class="dice-count-control">
            <button class="dice-count-btn" id="dice-count-dec">-</button>
            <input type="number" id="dice-count" value="1" min="1" max="10">
            <button class="dice-count-btn" id="dice-count-inc">+</button>
          </div>
        </div>
        <button class="dialog-btn dialog-btn-primary dice-roll-btn" id="dice-roll-confirm">Roll</button>
      </div>
      <div class="dice-result-section" id="dice-result-section" style="display: none;">
        <div class="dice-rolls" id="dice-rolls"></div>
        <div class="dice-total-display">
          <span class="dice-total-label">Total:</span>
          <span class="dice-total-value" id="dice-total-value">0</span>
        </div>
        <p class="dice-description" id="dice-description">Roll: 1d10</p>
      </div>
    </div>
    <div class="dialog-footer">
      <button class="dialog-btn" id="dice-dialog-cancel">Close</button>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/script.js"></script>
<script src="../js/notes.js"></script>
</body>
</html>
